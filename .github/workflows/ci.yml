name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/angular/package-lock.json
            examples/node-ssr/package-lock.json
            examples/solid/package-lock.json
            examples/svelte/package-lock.json
            examples/vanilla/package-lock.json
            examples/vite-react/package-lock.json
            examples/vue/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm run install:examples

      - name: Run release verification
        run: npm run release:verify
